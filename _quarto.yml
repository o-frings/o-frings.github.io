project:
  type: website
  output-dir: docs
  resources:
    - .nojekyll

website:
  title: "Oliver Frings"
  description: "Oliver Frings — economist working on carbon market integrity and public preferences for climate and forest policy. PhD candidate at AgroParisTech and the Climate Economics Chair, Paris."
  site-url: https://o-frings.github.io
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: true
  search: false
  navbar:
    left:
      - href: index.qmd
        text: About
      - href: research.qmd
        text: Research
      - href: software.qmd
        text: Software
      - href: talks.qmd
        text: Talks
      - href: cv.qmd
        text: CV
  page-footer:
    left: "© 2026 Oliver Frings"
    right:
      - icon: github
        href: https://github.com/o-frings
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/oliver-frings-x161/
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:oliver.frings@agroparistech.fr
        aria-label: Email

format:
  html:
    theme: [cosmo, custom.scss]
    toc: false
    callout-appearance: minimal
    callout-icon: false
    link-external-newwindow: true
    include-in-header:
      text: |
        <meta name="google-site-verification" content="ge5UxnFAmTENljh_lLbu57GB_MoQD5yZYR192TMtkgE">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Person",
          "name": "Oliver Frings",
          "url": "https://o-frings.github.io",
          "jobTitle": "PhD Candidate in Economics",
          "worksFor": [
            {"@type": "Organization", "name": "AgroParisTech"},
            {"@type": "Organization", "name": "Climate Economics Chair"}
          ],
          "affiliation": [
            {"@type": "Organization", "name": "University of Cambridge, Department of Land Economy"}
          ],
          "email": "oliver.frings@agroparistech.fr",
          "sameAs": [
            "https://orcid.org/0000-0003-2682-2304",
            "https://scholar.google.com/citations?user=DgFqKHYAAAAJ",
            "https://www.linkedin.com/in/oliver-frings-x161/",
            "https://github.com/o-frings"
          ]
        }
        </script>
    include-after-body:
      text: |
        <script>
        // Swipe left/right on touch devices to move between pages
        (function () {
          if (!('ontouchstart' in window)) return;
          var pages = ['index.html', 'research.html', 'software.html', 'talks.html', 'cv.html'];
          var path = location.pathname.split('/').pop() || 'index.html';
          var i = pages.indexOf(path);
          if (i < 0) return;
          var x0 = null, y0 = 0, t0 = 0;
          document.addEventListener('touchstart', function (e) {
            if (e.touches.length !== 1) { x0 = null; return; }
            x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; t0 = Date.now();
          }, { passive: true });
          document.addEventListener('touchend', function (e) {
            if (x0 === null) return;
            var dx = e.changedTouches[0].clientX - x0;
            var dy = e.changedTouches[0].clientY - y0;
            var dt = Date.now() - t0;
            x0 = null;
            if (dt > 600 || Math.abs(dx) < 70 || Math.abs(dy) > 50) return;
            var j = dx < 0 ? i + 1 : i - 1;
            if (j < 0 || j >= pages.length) return;
            location.href = pages[j];
          }, { passive: true });
        })();
        </script>
