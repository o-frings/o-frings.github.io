project:
  type: website
  output-dir: docs
  resources:
    - .nojekyll

website:
  title: "Oliver Frings"
  description: "Environmental and resource economist working on carbon market integrity and public preferences for climate and forest policy."
  site-url: https://o-frings.github.io
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: About
      - href: research.qmd
        text: Research
      - href: software.qmd
        text: Software
      - href: talks.qmd
        text: Talks & Policy
      - href: cv.qmd
        text: CV
    right:
      - icon: github
        href: https://github.com/o-frings
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/oliver-frings-x161/
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:oliver.frings@agroparistech.fr
        aria-label: Email
  page-footer:
    center: "© 2026 Oliver Frings"

format:
  html:
    theme: [cosmo, custom.scss]
    toc: false
    callout-appearance: minimal
    callout-icon: false
    link-external-newwindow: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600..700&display=swap" rel="stylesheet">
